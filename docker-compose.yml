version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-user-db
    environment:
      POSTGRES_DB: user-service-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: